<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Український Транслітератор</title>
  <style>
    :root {
      --accent: #667eea;
      --surface: #0f1115;
      --text: #f3f4f6;
      --subtext: #cbd5e1;
      --muted-bg: #171a21;
      --border: #2a2f3a;
      --success: #48bb78;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 840px;
      width: 100%;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(20px, 2.6vw, 30px);
    }

    .rules-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 18px;
      display: grid;
      place-items: center;
    }

    .input-section,
    .output-section {
      margin-bottom: 16px;
    }

    label {
      display: block;
      color: var(--subtext);
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 15px;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      resize: vertical;
      padding: 14px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--muted-bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.5;
      font-family: inherit;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin: 18px 0;
    }

    /* Only style the main action buttons inside the .button-group so
       they don't interfere with small icon buttons like .rules-icon */
    .button-group button {
      padding: 14px 16px;
      min-height: 50px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      color: #fff;
      width: 48%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    #copyBtn {
      background: var(--success);
    }

    #copyBtn:disabled {
      background: #9aa0a6;
      cursor: not-allowed;
      opacity: .7;
    }

    #clearBtn {
      background: var(--accent);
    }

    .copy-feedback {
      text-align: center;
      color: var(--success);
      font-weight: 700;
      font-size: 15px;
      min-height: 22px;
      opacity: 0;
    }

    .copy-feedback.show {
      opacity: 1;
    }

    .rules-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, .55);
      align-items: center;
      justify-content: center;
    }

    .rules-modal.show {
      display: flex;
    }

    .rules-content {
      background: var(--surface);
      color: var(--text);
      width: 90%;
      max-width: 400px;
      max-height: 80vh;
      border-radius: 16px;
      padding: 24px;
      overflow: auto;
    }

    .rules-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .rules-title {
      font-size: 18px;
    }

    .rules-close {
      background: var(--muted-bg);
      color: var(--subtext);
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 22px;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .rules-content p {
      color: var(--subtext);
      margin: 10px 0 8px;
      font-size: 14px;
      line-height: 1.5;
    }

    .rules-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .rule-item {
      padding: 8px 6px;
      background: var(--muted-bg);
      border-radius: 10px;
      text-align: center;
      border: 1.5px solid var(--border);
    }

    .rule-item .from {
      font-size: 20px;
      font-weight: 800;
      color: var(--accent);
      display: block;
    }

    .rule-item .arrow {
      color: var(--subtext);
      margin: 4px 0;
      display: block;
      font-size: 13px;
    }

    .rule-item .to {
      font-size: 15px;
      color: var(--text);
      display: block;
      font-weight: 700;
    }

    @media (min-width: 768px) {
      body {
        padding: 30px;
      }

      .container {
        padding: 34px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>🇺🇦 Український Транслітератор</h1>
      <button class="rules-icon" id="rulesBtn" type="button" aria-haspopup="dialog" aria-expanded="false"
        aria-controls="rulesModal">?</button>
    </div>

    <div class="input-section">
      <label for="input">Український Текст</label>
      <textarea id="input" placeholder="Вставте український текст тут..." autocomplete="off" autocorrect="off"
        spellcheck="false"></textarea>
    </div>

    <div class="output-section">
      <label for="output">Транслітерований Текст</label>
      <textarea id="output" readonly></textarea>
    </div>

    <div class="button-group">
      <button id="copyBtn" type="button" disabled>Копіювати</button>
      <button id="clearBtn" type="button" aria-label="Очистити текст">Очистити</button>
    </div>

    <div class="copy-feedback" id="copyFeedback" role="status" aria-live="polite">✓ Скопійовано!</div>
  </div>

  <!-- Rules Modal -->
  <div class="rules-modal" id="rulesModal" role="dialog" aria-modal="true" aria-labelledby="rulesTitle">
    <div class="rules-content">
      <div class="rules-header">
        <h2 class="rules-title" id="rulesTitle">Правила Транслітерації</h2>
        <button class="rules-close" id="closeRules" type="button" aria-label="Закрити">×</button>
      </div>
      <p>Кожна українська літера перетворюється на відповідний латинський символ або комбінацію:</p>
      <div class="rules-grid" id="rulesGrid"></div>
    </div>
  </div>

  <script>
    const replacements = {
      'А': 'A', 'а': 'a', 'Б': 'B', 'б': 'b', 'В': 'V', 'в': 'v', 'Г': 'Q', 'г': 'q', 'Ґ': 'G', 'ґ': 'g',
      'Д': 'D', 'д': 'd', 'Е': 'E', 'е': 'e', 'Є': 'Je', 'є': 'je', 'Ж': 'X', 'ж': 'x', 'З': 'Z', 'з': 'z',
      'И': 'Y', 'и': 'y', 'І': 'I', 'і': 'i', 'Ї': 'Ji', 'ї': 'ji', 'Й': 'J', 'й': 'j', 'К': 'K', 'к': 'k',
      'Л': 'L', 'л': 'l', 'М': 'M', 'м': 'm', 'Н': 'N', 'н': 'n', 'О': 'O', 'о': 'o', 'П': 'P', 'п': 'p',
      'Р': 'R', 'р': 'r', 'С': 'S', 'с': 's', 'Т': 'T', 'т': 't', 'У': 'U', 'у': 'u', 'Ф': 'F', 'ф': 'f',
      'Х': 'H', 'х': 'h', 'Ц': 'Ts', 'ц': 'ts', 'Ч': 'Tc', 'ч': 'tc', 'Ш': 'C', 'ш': 'c', 'Щ': 'Ctc', 'щ': 'ctc',
      'Ю': 'Ju', 'ю': 'ju', 'Я': 'Ja', 'я': 'ja', 'Ь': 'J', 'ь': 'j'
    };

    // Fix typo in replacements (remove space from ' Ї' key)
    delete replacements[' Ї'];
    replacements['Ї'] = 'Ji';

    const inputBox = document.getElementById('input');
    const outputBox = document.getElementById('output');
    const copyBtn = document.getElementById('copyBtn');
    const copyFeedback = document.getElementById('copyFeedback');
    const rulesBtn = document.getElementById('rulesBtn');
    const rulesModal = document.getElementById('rulesModal');
    const closeRules = document.getElementById('closeRules');
    const rulesGrid = document.getElementById('rulesGrid');
    const clearBtn = document.getElementById('clearBtn');

    // Populate rules grid
    function populateRules() {
      const arr = Object.entries(replacements).sort((a, b) => a[0].localeCompare(b[0], 'uk'));
      rulesGrid.innerHTML = arr.map(([from, to]) => `
        <div class="rule-item">
          <span class="from">${from}</span>
          <span class="arrow">→</span>
          <span class="to">${to}</span>
        </div>
      `).join('');
    }
    populateRules();

    // Transliterate
    function transliterate(text) {
      return [...text].map(ch => replacements[ch] ?? ch).join('');
    }

    function updateOutput() {
      const translit = transliterate(inputBox.value);
      outputBox.value = translit;
      copyBtn.disabled = !translit;
    }

    // Live update on input
    inputBox.addEventListener('input', updateOutput);

    // Clear
    clearBtn.addEventListener('click', () => {
      inputBox.value = '';
      updateOutput();
      inputBox.focus();
    });

    // Copy
    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(outputBox.value);
      } catch {
        outputBox.select();
        document.execCommand('copy');
      }
      copyFeedback.classList.add('show');
      setTimeout(() => copyFeedback.classList.remove('show'), 1600);
    });

    // Modal open/close
    function openModal() {
      rulesModal.classList.add('show');
      rulesBtn.setAttribute('aria-expanded', 'true');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      rulesModal.classList.remove('show');
      rulesBtn.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    }
    rulesBtn.addEventListener('click', openModal);
    closeRules.addEventListener('click', closeModal);
    rulesModal.addEventListener('click', (e) => {
      if (e.target === rulesModal) closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && rulesModal.classList.contains('show')) closeModal();
    });
  </script>
</body>

</html>
