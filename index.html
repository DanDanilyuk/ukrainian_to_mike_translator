<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Український Транслітератор</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>🇺🇦 Український Транслітератор</h1>
      <button class="rules-icon" id="rulesBtn" type="button" aria-haspopup="dialog" aria-expanded="false"
        aria-controls="rulesModal">?</button>
    </div>

    <div class="input-section">
      <label for="input">Український Текст</label>
      <textarea id="input" autofocus placeholder="Вставте український текст тут..." autocomplete="off" autocorrect="off"
        spellcheck="false"></textarea>
      <div class="char-count" id="charCount">0 символів</div>
    </div>

    <div class="output-section">
      <label for="output">Транслітерований Текст</label>
      <textarea id="output" readonly placeholder="Транслітерований текст з'явиться тут..."></textarea>
    </div>

    <div class="button-group">
      <button id="copyBtn" type="button" disabled>Копіювати</button>
      <button id="clearBtn" type="button" aria-label="Очистити текст">Очистити</button>
    </div>

    <div class="copy-feedback" id="copyFeedback" role="status" aria-live="polite">✓ Скопійовано!</div>
  </div>

  <div class="rules-modal" id="rulesModal" role="dialog" aria-modal="true" aria-labelledby="rulesTitle">
    <div class="rules-content">
      <div class="rules-header">
        <h2 class="rules-title" id="rulesTitle">Правила Транслітерації</h2>
        <button class="rules-close" id="closeRules" type="button" aria-label="Закрити">×</button>
      </div>
      <p>Кожна українська літера перетворюється на відповідний латинський символ або комбінацію:</p>
      <div class="rules-grid" id="rulesGrid"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
